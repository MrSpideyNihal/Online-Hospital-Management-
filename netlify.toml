[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─────────────────────────────────────────────────────────────────────────────
# Stale-shell safety net: if an old HTML shell asks for deleted chunk/css files,
# serve fallback assets (200 with correct MIME) instead of 404 text/plain.
# This prevents MIME errors and triggers a hard reload to a fresh shell.
#
# NOTE: These are non-forced redirects. Existing real files are served normally.
# The fallback is only used when the requested file does not exist.
# ─────────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/_next/static/chunks/*"
  to = "/chunk-fallback.js"
  status = 200

[[redirects]]
  from = "/_next/static/css/*"
  to = "/chunk-fallback.css"
  status = 200

# ─────────────────────────────────────────────────────────────────────────────
# HTML pages / API routes — NEVER cache on CDN or browser.
#
# `Netlify-CDN-Cache-Control: no-store` is the authoritative header for
# Netlify's Durable Cache layer. It completely opts this response out of
# storage in the Durable Cache. Previously cached entries are bypassed on
# the next request once this header is seen (Netlify purges on TTL expiry or
# when the edge worker sees no-store on a live pass-through).
#
# `Netlify-Cache-Tag: html` allows us to hit the Netlify Purge API to
# invalidate all HTML-tagged entries instantly on a new deploy. This is the
# manual purge escape hatch.
# ─────────────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    CDN-Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"
    Surrogate-Control = "no-store"

# ─────────────────────────────────────────────────────────────────────────────
# Hashed static assets — cache forever (content-addressed, safe to cache).
# These paths contain the BUILD_ID so a new deploy means new paths anyway.
# This override MUST appear after `/*` so it takes precedence.
# ─────────────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    CDN-Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"
    Pragma = ""
    Expires = ""

[[headers]]
  for = "/chunk-fallback.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    CDN-Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"
    Surrogate-Control = "no-store"

[[headers]]
  for = "/chunk-fallback.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    CDN-Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"
    Surrogate-Control = "no-store"
